kind = "web"
previewPath = "/"
title = "Website Analyser"
version = "1.0.0"
id = "artifacts/website-analyser"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25376

[services.development]
run = "pnpm --filter @workspace/website-analyser run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/website-analyser", "run", "build" ]
publicDir = "artifacts/website-analyser/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25376"
BASE_PATH = "/"
